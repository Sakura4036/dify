identity:
  name: patent_content
  author: JiaWen Huang
  label:
    en_US: Get Patent Content
    zh_Hans: 获取专利内容
description:
  human:
    en_US: A tool for querying zhihuiya patent data (P011, P018, P025), returning up to 100 patents.
    zh_Hans: 一个调用智慧芽专利数据（P011、P018、P025）的工具，最多批量返回100条专利的内容。
  llm: A tool for querying zhihuiya patent data (P011, P018, P025), returning up to 100 patents.
parameters:
  - name: patent_id
    type: string
    required: false
    label:
      en_US: patent_id
      zh_Hans: 专利id
      pt_BR: patent_id
    llm_description: patent id
    form: llm
  - name: patent_number
    type: string
    required: false
    label:
      en_US: patent_number
      zh_Hans: 专利公开(公告)号
      pt_BR: patent_number
    llm_description: patent_number id
    form: llm
  - name: lang
    type: select
    required: false
    options:
      - value: en
        label:
          en_US: English
          zh_Hans: English
          pt_BR: English
      - value: cn
        label:
          en_US: Chinese
          zh_Hans: 中文
          pt_BR: Chinese
      - value: jp
        label:
          en_US: Japanese
          zh_Hans: 日本語
          pt_BR: Japanese
    label:
      en_US: language
      zh_Hans: 优先语言
      pt_BR: language
    default: en
    form: form
  - name: title_abstract
    type: boolean
    default: true
    label:
      en_US: Require title and abstract
      zh_Hans: 需要返回标题和摘要
    form: form
  - name: claim
    type: boolean
    default: false
    label:
      en_US: Require claim text
      zh_Hans: 需要返回权利要求
    form: form
  - name: tech_summary
    type: boolean
    default: false
    label:
      en_US: Require Technological triad
      zh_Hans: 需要返回技术三要素
    form: form






