identity:
  name: similar_search
  author: JiaWen Huang
  label:
    en_US: Similar Search Patent
    zh_Hans: 相似专利查询
description:
  human:
    en_US: A tool for querying similar patents using the zhihuiya patent number search (P007), returning up to 1000 similar patents, sorted by similarity score from high to low.
    zh_Hans: 一个调用智慧芽专利号检索相似专利（P007）的工具，最多返回前1000条相似专利，默认按照相似度分数从高到低排序。
  llm: A tool for querying similar patents using the zhihuiya patent number search (P007), returning up to 1000 similar patents, sorted by similarity score from high to low.
parameters:
  - name: patent_id
    type: string
    required: false
    label:
      en_US: patent_id
      zh_Hans: 专利id
      pt_BR: patent_id
    llm_description: patent id
    form: llm
  - name: patent_number
    type: string
    required: false
    label:
      en_US: patent_number
      zh_Hans: 专利公开(公告)号
      pt_BR: patent_number
    llm_description: patent_number id
    form: llm

  - name: num
    type: number
    required: false
    label:
      en_US: num
      zh_Hans: 搜索结果数
      pt_BR: num
    form: llm
    default: 50

  - name: relevancy
    type: string
    required: false
    label:
      en_US: minimum relevancy
      zh_Hans: 最小相似度
      pt_BR: minimum relevancy
    llm_description: minimum relevancy
    form: llm

  - name: country
    type: string
    required: false
    label:
      en_US: country code and application type
      zh_Hans: 国家/地区/组织代码及申请类型
      pt_BR: country code and application type
    human_description:
      en_US: country code and application type, multiple content items separated by commas
      zh_Hans: 国家/地区/组织代码及申请类型,多个内容项之间用英文,隔开
      pt_BR: country code and application type, multiple content items separated by commas
    llm_description: country code and application type, multiple content items separated by commas
    form: llm





