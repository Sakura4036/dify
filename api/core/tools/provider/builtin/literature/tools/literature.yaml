identity:
  name: literature search
  author: JiaWen Huang
  label:
    en_US: Literature Search
    zh_Hans: 文献搜索
description:
  human:
    en_US: Literature is a one-click search tool that integrates WOS, Semantic, PubMed and other literature databases.
    zh_Hans: literature是综合WOS、Semantic、PubMed等文献数据库于一体的一键式搜索工具。
  llm:  Literature is a one-click search tool that integrates WOS, Semantic, PubMed and other literature databases.
parameters:
  - name: query
    type: string
    required: true
    label:
      en_US: query
      zh_Hans: 搜索
    human_description:
      en_US: Text query that will be matched against the paper's title and abstract. All terms are stemmed in English.
      zh_Hans: 将与论文标题和摘要匹配的文本查询。所有术语均以英文为词干。
    llm_description: Text query that will be matched against the paper's title and abstract. All terms are stemmed in English.
    form: llm
  - name: year
    type: string
    required: false
    label:
      en_US: Date range
      zh_Hans: 日期范围（年）
    human_description:
      en_US: The date range of the search results, separated by hyphens, e.g. 2015- means after 2015..
      zh_Hans: 搜索结果的日期范围，使用连字符号分割， 例如： 2015- 表示2015年以后。
    llm_description: The date range of the search results, separated by hyphens
    default: "1960-"
    form: llm
  - name: document_type
    type: select
    required: false
    options:
      - value: All
        label:
          en_US: all document types
          zh_Hans: 所有文档类型
          pt_BR: all document types
      - value: Article
        label:
          en_US: Article
          zh_Hans: 文章
          pt_BR: Article
      - value: Review
        label:
          en_US: Review
          zh_Hans: 综述
          pt_BR: Review
    default: all
    label:
      en_US: Document type
      zh_Hans: 文档类型
    human_description:
      en_US: The type of document to filter the search results.
      zh_Hans: 用于过滤搜索结果的文档类型。
    llm_description: The type of document to filter the search results.
    form: llm
  - name: fields_of_study
    type: string
    required: false
    label:
      en_US: Fields of Study
      zh_Hans: 研究领域
    human_description:
      en_US: Fields of study to filter the search results, separated by commas.
      zh_Hans: 用于过滤搜索结果的研究领域，使用逗号分隔。
    llm_description: Fields of study to filter the search results, separated by commas.
    form: llm
  - name: wos_num
    type: number
    required: false
    default: 50
    label:
      en_US: wos_num
      zh_Hans: wos_num
    human_description:
      en_US: The number of search results to return by WOS.
      zh_Hans: WOS返回的搜索结果数量。
    llm_description: The number of search results to return by WOS.
    form: llm
  - name: semantic_num
    type: number
    required: false
    default: 50
    label:
      en_US: semantic_num
      zh_Hans: semantic_num
    human_description:
      en_US: The number of search results to return by Semantic Scholar.
      zh_Hans: Semantic Scholar返回的搜索结果数量。
    llm_description: The number of search results to return by Semantic Scholar.
    form: llm
  - name: fields
    type: string
    required: false
    label:
      en_US: Semantic Return Fields
      zh_Hans: Semantic返回字段
    human_description:
      en_US: Fields to be returned, separated by commas. default is "title,abstract,externalIds,openAccessPdf,year,publicationTypes"
      zh_Hans: 需要返回的字段，使用逗号分割。 默认为"title,abstract,externalIds,openAccessPdf,year,publicationTypes"
    llm_description: Fields to be returned, separated by commas. default is "title,abstract,externalIds,openAccessPdf,year,publicationTypes"
    form: llm
  - name: filtered
    type: boolean
    required: False
    default: True
    label:
      en_US: filtered
      zh_Hans: 过滤无效文献
    human_description:
      en_US: Filter invalid literature, invalid literature includes literature without abstract, literature not searched
      zh_Hans: 过滤无效文献，无效文献包括无摘要、未搜索到的文献
    llm_description: Filter invalid literature, invalid literature includes literature without abstract, literature not searched
    form: form
  - name: wos_api_key
    type: string
    required: false
    label:
      en_US: wos_api_key
      zh_Hans: wos_api_key
    human_description:
      en_US: Web of Science API key.
      zh_Hans: Web of Science API key。
    llm_description: Web of Science API key.
    form: llm
