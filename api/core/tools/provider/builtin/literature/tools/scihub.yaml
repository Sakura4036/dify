identity:
  name: ScihubDownload
  author: JiaWen Huang
  label:
    en_US: ScihubDownload
    zh_Hans: Scihub下载
description:
  human:
    en_US: ScihubDownload is a tool that downloads papers from Scihub.
    zh_Hans: ScihubDownload是一个从Scihub下载论文的工具。
  llm: ScihubDownload is a tool that downloads papers from Scihub.
parameters:
  - name: doi
    type: string
    required: true
    label:
      en_US: doi
      zh_Hans: doi
    human_description:
      en_US: The DOI of the paper to download.
      zh_Hans: 要下载的论文的DOI。
    llm_description: The DOI of the paper to download.
    form: llm
  - name: title
    type: string
    required: false
    label:
      en_US: title
      zh_Hans: 标题
    human_description:
      en_US: The title of the paper to download.
      zh_Hans: 要下载的论文的标题。
    llm_description: The title of the paper to download.
    form: llm
  - name: scihub_url
    type: string
    required: false
    label:
      en_US: scihub_url
      zh_Hans: scihub_url
    human_description:
      en_US: the url of scihub.
      zh_Hans: scihub的镜像url。
    llm_description: the url of scihub.
    form: llm
  - name: convert
    type: boolean
    required: false
    label:
      en_US: convert
      zh_Hans: convert
    human_description:
      en_US: Whether to convert the downloaded paper to markdown format.
      zh_Hans: 是否将下载的论文转换为markdown格式。
    llm_description: Whether to convert the downloaded paper to markdown format.
    form: form

